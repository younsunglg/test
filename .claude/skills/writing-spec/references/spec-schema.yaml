# spec.yaml 스키마 템플릿
# 전체 앱의 불변 계약. 필드 6개 고정.

version: 1

scenarios:
  - id: "FEATURE-001"           # 유일한 식별자. {도메인}-{번호}
    name: "시나리오 이름"          # 사람이 읽을 이름
    given: "전제 조건"            # 사용자/시스템 상태
    when: "사용자 행동"            # 트리거 동작
    then: "기대 결과"             # 확인 가능한 결과
    examples:                    # 구체적 입력/출력 쌍 (1개 이상 필수)
      - input: { key: "value" }  # 사용자가 넣는 값
        expect:                  # 화면에서 확인 가능한 상태 (다중 필드 가능)
          text: "표시될 텍스트"     # 화면 텍스트
          count: 3                # 요소 개수
          visible: true           # 존재 여부
          items: ["A", "B"]       # 목록/순서
